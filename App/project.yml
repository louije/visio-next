name: VisioNext
options:
  bundleIdPrefix: com.meidosem
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  VisioCore:
    path: ../VisioCore
targets:
  VisioNext:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: VisioCore
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: visio-next
        NSCalendarsFullAccessUsageDescription: "visio-next reads your calendar to show upcoming meetings and their video links."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meidosem.visionext
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
