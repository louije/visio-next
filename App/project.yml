name: VisioNext
options:
  bundleIdPrefix: com.meidosem
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  VisioCore:
    path: ../VisioCore
targets:
  VisioNext:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: VisioCore
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: visio-next
        NSCalendarsFullAccessUsageDescription: "visio-next reads your calendar to show upcoming meetings and their video links."
    entitlements:
      path: VisioNext.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.meidosem.visionext
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meidosem.visionext
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: "684SSZLSSG"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES

# Custom "Install" scheme: select it and ⌘B to build, Developer ID-sign, and install
# the app into ~/Applications. The post-build action delegates to Scripts/install.sh
# (which signs + installs into ~/Applications using its own DerivedData, so it doesn't
# collide with Xcode's build).
schemes:
  VisioNext:
    build:
      targets:
        VisioNext: all
    run:
      config: Debug
  Install:
    build:
      targets:
        VisioNext: [build]
      postActions:
        - name: "Build, sign & install to ~/Applications"
          settingsTarget: VisioNext
          script: |
            export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
            "${SRCROOT}/../Scripts/install.sh"
