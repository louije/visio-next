name: VisioNext
options:
  bundleIdPrefix: com.meidosem
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
# Surface these in Xcode's navigator (not compiled). project.yml is the source of truth;
# after editing it, run `xcodegen generate` to apply.
fileGroups:
  - project.yml
  - VisioNext.entitlements
  - Widget/VisioWidget.entitlements
packages:
  VisioCore:
    path: ../VisioCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  VisioNext:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
      # Also compiled into the app so the widget views are previewable in the canvas
      # (the VisioWidget extension target can't host previews on macOS). Preview with
      # the VisioNext scheme selected.
      - Widget/WidgetViews.swift
      - Widget/Intents.swift
      - Widget/SharedStore.swift
    dependencies:
      - package: VisioCore
      - package: Sparkle
        product: Sparkle
      - target: VisioWidget
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: VisioNext
        # Declare French so macOS runs the app (and Sparkle's dialogs) in French.
        CFBundleDevelopmentRegion: fr
        CFBundleLocalizations: [fr, en]
        NSCalendarsFullAccessUsageDescription: "VisioNext observe les calendriers du système pour détecter les liens des prochaines réunions en ligne."
        # Tie the bundle version to the build settings so Sparkle sees real versions
        # (XcodeGen otherwise hardcodes 1.0 / 1).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Sparkle
        SUFeedURL: "https://louije.github.io/visio-next/appcast.xml"
        SUPublicEDKey: "7Ni3ph6l4ZQkluhi/JSVyriytlQRc9DaP6arRwYHDdo="
        SUEnableAutomaticChecks: true
    entitlements:
      path: VisioNext.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.meidosem.visionext
        # Required for EventKit under Hardened Runtime + provisioned (team) signing,
        # otherwise requestFullAccessToEvents() is silently denied (no prompt).
        com.apple.security.personal-information.calendars: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meidosem.visionext
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: VisioNext
        MARKETING_VERSION: "0.2.2"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: "684SSZLSSG"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
  VisioWidget:
    type: app-extension
    platform: macOS
    sources:
      - Widget
      - Sources/ServiceIcons.swift   # shared: the menu's service-glyph icon
      - Resources/Assets.xcassets     # shared: brand + service icon assets
    dependencies:
      - package: VisioCore
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: VisioNext
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/VisioWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.meidosem.visionext
        com.apple.security.personal-information.calendars: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meidosem.visionext.widget
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.2.2"
        CURRENT_PROJECT_VERSION: "4"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: "684SSZLSSG"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

# Custom "Install" scheme: select it and ⌘B to build, Developer ID-sign, and install
# the app into ~/Applications. The post-build action delegates to Scripts/install.sh
# (which signs + installs into ~/Applications using its own DerivedData, so it doesn't
# collide with Xcode's build).
schemes:
  VisioNext:
    build:
      targets:
        VisioNext: all
    run:
      config: Debug
  Install:
    build:
      targets:
        VisioNext: [build]
      postActions:
        - name: "Build, sign & install to ~/Applications"
          settingsTarget: VisioNext
          script: |
            export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
            "${SRCROOT}/../Scripts/install.sh"
